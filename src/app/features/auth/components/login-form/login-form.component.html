<div class="login-card">
  <div class="mobile-header">
    <h2 class="mobile-title">AppCita</h2>
  </div>

  <div class="card-header">
    <h2 class="card-title">Bienvenido</h2>
    <p class="card-subtitle">Por favor, ingresa los datos</p>
  </div>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="field-group">
      <label for="numPhone">Teléfono:</label>

      <div class="input-wrapper">
        <span class="material-symbols-outlined">call</span>
        <input class="input-field"
        formControlName="numPhone"
        id="numPhone"
        placeholder="ej:5512345678"
        type="text"
        (input)="soloNumeros($event)"
        />
      </div>
      <div class="error-text" *ngIf="loginForm.get('numPhone')?.invalid && loginForm.get('numPhone')?.touched">
        El teléfono debe tener 10 dígitos.
      </div>
    </div>

    <div class="field-group">
      <div class="label-row">
        <label for="password">Contraseña</label>
      </div>

      <div class="input-wrapper">
        <span class="material-symbols-outlined">lock</span>
        <input class="input-field"
        formControlName="password"
        id="password"
        placeholder="••••••••"
        type="password"
        minlength="8" />
      </div>
      <div class="error-text" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
        La contraseña es obligatoria.
      </div>

      <a routerLink="" class="small text-decoration-none text-primary">¿Olvidaste tu contraseña?</a>
    </div>



    <button class="submit-btn" type="submit" [disabled]="loginForm.invalid">
      Iniciar Sesión
    </button>
  </form>


</div>
