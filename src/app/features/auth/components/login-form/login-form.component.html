<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card p-4 shadow-lg border-0 rounded-4" style="max-width: 450px; width: 100%; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);">
    
    <div class="text-center mb-4">
      <h2 class="fw-bold text-primary">AppCita</h2>
      <p class="text-muted small">Bienvenido de nuevo. Ingresa tus datos.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="px-2">
      
      <div class="mb-3">
        <label class="form-label small fw-bold text-uppercase tracking-wider">Teléfono</label>
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0"><i class="bi bi-telephone"></i></span>
          <input type="text" 
                 formControlName="numPhone" 
                 class="form-control border-start-0 ps-0" 
                 placeholder="Ej: 5512345678"
                 maxlength="10">
        </div>
        
        <div class="text-danger small mt-1" 
             *ngIf="loginForm.get('numPhone')?.invalid && loginForm.get('numPhone')?.touched">
          El teléfono debe tener 10 dígitos.
        </div>
      </div>

      <div class="mb-4">
         <label class="form-label small fw-bold text-uppercase">Contraseña</label>

        <div class="input-group">
          <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock"></i></span>
          <input type="password" 
                 formControlName="password" 
                 class="form-control border-start-0 ps-0" 
                 placeholder="••••••••">
        </div>

        <div class="d-flex justify-content-between">
         
          <a routerLink="" class="small text-decoration-none text-primary">¿Olvidaste tu contraseña?</a>
        </div>

        <div class="text-danger small mt-1" 
             *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          La contraseña es obligatoria.
        </div>
      </div>

      <button type="submit" 
              class="btn btn-primary w-100 py-3 fw-bold rounded-3 shadow-sm"
              [disabled]="loginForm.invalid"
              style="background: linear-gradient(135deg, #46608a 0%, #3a537d 100%); border: none;">
        Iniciar Sesión
      </button>

      <div class="text-center mt-4">
        <p class="small text-muted">
          ¿No tienes cuenta? 
          <a routerLink="/register" class="fw-bold text-primary text-decoration-none">Registrate</a>
        </p>
      </div>

    </form>
  </div>
</div>
